<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="description" content="FutMaster 1.2, manager de futebol local com calendário diário, competições completas, negociações, relacionamentos e automação." />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="v04.css" />
  <link rel="stylesheet" href="v05.css" />
  <link rel="stylesheet" href="v06.css" />
  <link rel="stylesheet" href="v07.css" />
  <link rel="stylesheet" href="v08.css" />
  <link rel="stylesheet" href="v09.css" />
  <link rel="stylesheet" href="v10.css" />
  <link rel="stylesheet" href="v11.css" />
  <link rel="stylesheet" href="v12.css" />
  <title>FutMaster 1.2</title>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="brand"><div class="brand-mark">FM</div><div><strong>FutMaster</strong><span>Gestão total do clube</span></div></div>
      <nav class="nav-list">
        <button class="nav-item active" data-view="dashboard">Visão geral</button>
        <button class="nav-item" data-view="calendar">Jogos</button>
        <button class="nav-item" data-view="squad">Elenco</button>
        <button class="nav-item" data-view="academy">Base</button>
        <button class="nav-item" data-view="staff">Automação</button>
        <button class="nav-item" data-view="board">Diretoria</button>
        <button class="nav-item" data-view="fans">Sócios e torcida</button>
        <button class="nav-item" data-view="stadium">Ingressos e estádio</button>
        <button class="nav-item" data-view="commercial">Comercial</button>
        <button class="nav-item" data-view="tactics">Táticas</button>
        <button class="nav-item" data-view="league">Classificação</button>
        <button class="nav-item" data-view="transfers">Mercado</button>
        <button class="nav-item" data-view="medical">Médico</button>
        <button class="nav-item" data-view="facilities">Instalações</button>
        <button class="nav-item" data-view="finance">Finanças</button>
        <button class="nav-item" data-view="world">Mundo</button>
        <button class="nav-item" data-view="history">Histórico</button>
      </nav>
      <div class="sidebar-footer"><button id="new-game-button" class="secondary-button">Novo jogo</button><small>Carreira salva neste dispositivo.</small></div>
    </aside>
    <main class="main-content">
      <header class="topbar"><div><span class="eyebrow">Temporada <strong id="season-label">2026</strong></span><h1 id="page-title">Visão geral</h1></div><div class="club-badge" id="club-badge" aria-label="Clube controlado"></div></header>
      <section id="app-view" aria-live="polite"></section>
    </main>
  </div>
  <dialog id="new-game-dialog">
    <form method="dialog" class="dialog-card" id="new-game-form">
      <div><span class="eyebrow">Começar carreira</span><h2>Escolha seu clube</h2><p>Administre tudo manualmente, delegue setores específicos ou contrate uma diretoria para operar o clube inteiro.</p></div>
      <label>Nome do treinador<input id="manager-name" name="manager" maxlength="30" value="Vitor Camillo" required /></label>
      <label>Clube<select id="club-select" name="club"></select></label>
      <div class="dialog-actions"><button value="cancel" class="secondary-button">Cancelar</button><button value="default" id="start-game-button" class="primary-button">Iniciar carreira</button></div>
    </form>
  </dialog>
  <script src="core.js" defer></script>
  <script src="v04-compat.js" defer></script>
  <script src="match-engine.js" defer></script>
  <script src="systems.js" defer></script>
  <script src="rules.js" defer></script>
  <script src="app.js" defer></script>
  <script src="career-v04.js" defer></script>
  <script src="international-v04.js" defer></script>
  <script src="universe-v05.js" defer></script>
  <script src="match2d-v05.js" defer></script>
  <script src="stability-v06.js" defer></script>
  <script src="career-market-v07.js" defer></script>
  <script src="world-pyramid-v08.js" defer></script>
  <script src="football-depth-v09.js" defer></script>
  <script src="release-core-v10.js" defer></script>
  <script src="release-ui-v10.js" defer></script>
  <script src="social-local-v10.js" defer></script>
  <script src="management-v11.js" defer></script>
  <script src="calendar-v12.js" defer></script>
  <script>if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));</script>
</body>
</html>
